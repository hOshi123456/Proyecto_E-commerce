  /api/facturas/orders/{order_id}/pdf/:
    get:
      operationId: facturas_orders_pdf_retrieve
      description: Genera un archivo PDF con la factura de una orden pagada. El archivo
        se descarga automáticamente.
      summary: Generar factura en PDF
      parameters:
      - in: path
        name: order_id
        schema:
          type: integer
        required: true
      tags:
      - Facturas
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
