      operationId: catalog_categories_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Categoría.
        required: true
      tags:
      - Catálogo
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
