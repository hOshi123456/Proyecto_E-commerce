openapi: 3.0.3
info:
  title: API E-commerce
  version: 1.0.0
  description: API REST para gestionar usuarios, categorías, productos, variantes,
    carrito, órdenes, pagos, cupones, reseñas y facturas PDF.
paths:
  /api/cart/:
    get:
      operationId: cart_retrieve
      summary: Consultar carrito
      tags:
      - Carrito
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
  /api/cart/add/:
    post:
      operationId: cart_add_create
      summary: Agregar variante al carrito
      tags:
      - Carrito
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCartItemRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AddCartItemRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AddCartItemRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
  /api/cart/clear/:
    delete:
      operationId: cart_clear_destroy
      summary: Vaciar carrito
      tags:
      - Carrito
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
  /api/cart/items/{item_id}/:
    patch:
      operationId: cart_items_partial_update
      summary: Actualizar item en el carrito
      parameters:
      - in: path
        name: item_id
        schema:
          type: integer
        required: true
      tags:
      - Carrito
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateCartItemRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateCartItemRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateCartItemRequest'
      security:
      - jwtAuth: []
      responses:
