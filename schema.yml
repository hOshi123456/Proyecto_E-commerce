            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
  /api/cart/items/{item_id}/remove/:
    delete:
      operationId: cart_items_remove_destroy
      summary: Eliminar item del carrito
      parameters:
      - in: path
        name: item_id
        schema:
