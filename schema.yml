  /api/cupones/validate/:
    post:
      operationId: cupones_validate_create
      description: Comprueba si un cupón está activo y calcula el descuento según
        el subtotal.
      summary: Validar cupón
      tags:
      - Cupones
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CuponValidationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CuponValidationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CuponValidationRequest'
